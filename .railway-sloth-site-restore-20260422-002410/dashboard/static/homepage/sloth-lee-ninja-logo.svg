<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slothFur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0826D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A5C3E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ninjaCloak" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ninja cloak/hood background -->
  <path d="M 80 40 Q 80 20 128 20 Q 176 20 176 40 L 176 120 Q 176 140 128 145 Q 80 140 80 120 Z" fill="url(#ninjaCloak)" />
  
  <!-- Cloak shadow detail -->
  <ellipse cx="128" cy="60" rx="40" ry="15" fill="#000000" opacity="0.3" />

  <!-- Head (sloth face) -->
  <circle cx="128" cy="110" r="50" fill="url(#slothFur)" />

  <!-- Left ear -->
  <circle cx="95" cy="70" r="18" fill="url(#slothFur)" />
  <circle cx="95" cy="70" r="12" fill="#9B7B5E" />

  <!-- Right ear -->
  <circle cx="161" cy="70" r="18" fill="url(#slothFur)" />
  <circle cx="161" cy="70" r="12" fill="#9B7B5E" />

  <!-- Face markings (calm sloth expression) -->
  <ellipse cx="110" cy="100" rx="12" ry="18" fill="#6B5438" />
  <ellipse cx="146" cy="100" rx="12" ry="18" fill="#6B5438" />

  <!-- Eyes (ninja focused look) -->
  <circle cx="112" cy="95" r="6" fill="#000000" />
  <circle cx="144" cy="95" r="6" fill="#000000" />
  <circle cx="113" cy="93" r="2" fill="#ffffff" />
  <circle cx="145" cy="93" r="2" fill="#ffffff" />

  <!-- Nose -->
  <circle cx="128" cy="115" r="5" fill="#5A4830" />

  <!-- Mouth (calm, peaceful smile) -->
  <path d="M 125 125 Q 128 128 131 125" stroke="#5A4830" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Ninja mask (black cloth over nose/mouth area) -->
  <ellipse cx="128" cy="120" rx="22" ry="16" fill="#1a1a1a" opacity="0.8" />
  
  <!-- Mask detail - fabric texture -->
  <line x1="110" y1="120" x2="120" y2="122" stroke="#000000" stroke-width="0.5" opacity="0.5" />
  <line x1="136" y1="122" x2="146" y2="120" stroke="#000000" stroke-width="0.5" opacity="0.5" />

  <!-- Headband (ninja style, red) -->
  <ellipse cx="128" cy="60" rx="52" ry="10" fill="#DC3545" />
  <ellipse cx="128" cy="58" rx="52" ry="8" fill="#E63C52" />
  
  <!-- Headband center symbol (ninja star) -->
  <g transform="translate(128, 58)">
    <!-- 8-pointed star -->
    <path d="M 0,-8 L 2,-3 L 8,-2 L 4,2 L 5,8 L 0,5 L -5,8 L -4,2 L -8,-2 L -2,-3 Z" fill="#FFD700" />
  </g>

  <!-- Headband fabric wrap -->
  <path d="M 100 65 Q 100 70 95 75" stroke="#DC3545" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 156 65 Q 156 70 161 75" stroke="#DC3545" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- Chest/body (ninja gi style) -->
  <ellipse cx="128" cy="170" rx="48" ry="45" fill="#1a1a1a" />
  
  <!-- Gi front opening detail -->
  <path d="M 128 165 L 120 200 M 128 165 L 136 200" stroke="#333333" stroke-width="2" fill="none" />

  <!-- Belt (black with gold buckle) -->
  <rect x="95" y="165" width="66" height="12" fill="#1a1a1a" />
  
  <!-- Belt buckle -->
  <rect x="118" y="163" width="20" height="16" fill="#FFD700" />
  <circle cx="128" cy="171" r="4" fill="#FFA500" />

  <!-- Left arm (ninja pose) -->
  <ellipse cx="75" cy="150" rx="18" ry="35" fill="url(#slothFur)" transform="rotate(-20 75 150)" />
  
  <!-- Right arm (ninja pose) -->
  <ellipse cx="181" cy="150" rx="18" ry="35" fill="url(#slothFur)" transform="rotate(20 181 150)" />

  <!-- Left hand -->
  <circle cx="65" cy="170" r="12" fill="url(#slothFur)" />
  
  <!-- Right hand -->
  <circle cx="191" cy="170" r="12" fill="url(#slothFur)" />

  <!-- Claws/fingers (left) -->
  <line x1="60" y1="160" x2="55" y2="150" stroke="#5A4830" stroke-width="2" stroke-linecap="round" />
  <line x1="65" y1="158" x2="62" y2="145" stroke="#5A4830" stroke-width="2" stroke-linecap="round" />
  <line x1="70" y1="160" x2="72" y2="147" stroke="#5A4830" stroke-width="2" stroke-linecap="round" />

  <!-- Claws/fingers (right) -->
  <line x1="196" y1="160" x2="201" y2="150" stroke="#5A4830" stroke-width="2" stroke-linecap="round" />
  <line x1="191" y1="158" x2="194" y2="145" stroke="#5A4830" stroke-width="2" stroke-linecap="round" />
  <line x1="186" y1="160" x2="184" y2="147" stroke="#5A4830" stroke-width="2" stroke-linecap="round" />

  <!-- Legs -->
  <ellipse cx="110" cy="215" rx="16" ry="28" fill="url(#slothFur)" />
  <ellipse cx="146" cy="215" rx="16" ry="28" fill="url(#slothFur)" />

  <!-- Feet -->
  <ellipse cx="108" cy="245" rx="14" ry="10" fill="#7A5C3E" />
  <ellipse cx="148" cy="245" rx="14" ry="10" fill="#7A5C3E" />

  <!-- Kunai (ninja weapon) tucked in belt -->
  <g transform="translate(155, 170)">
    <!-- Blade -->
    <polygon points="0,-12 3,-2 -3,-2" fill="#C0C0C0" />
    <!-- Handle -->
    <rect x="-2" y="-2" width="4" height="8" fill="#8B4513" />
    <!-- Handle ring -->
    <circle cx="0" cy="6" r="3" fill="#FFD700" />
  </g>

  <!-- Aura/glow effect (ninja mystique) -->
  <circle cx="128" cy="120" r="56" fill="none" stroke="#DC3545" stroke-width="1" opacity="0.3" />
</svg>