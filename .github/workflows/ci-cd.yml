name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dissident-Backend-API
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: npm install
    
    - name: Run linter
      run: npm run lint --if-present
    
    - name: Run tests
      run: npm test --if-present
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test:test@localhost:5432/test
        JWT_SECRET: test-secret-key-for-testing-only
        ENCRYPTION_MASTER_KEY: test-master-key-32-chars-long!!
    
    - name: Run tests with coverage
      run: npm run test:coverage --if-present
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test:test@localhost:5432/test
        JWT_SECRET: test-secret-key-for-testing-only
        ENCRYPTION_MASTER_KEY: test-master-key-32-chars-long!!

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dissident-Backend-API
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: npm install
    
    - name: Run npm audit
      run: npm audit --audit-level=high --ignore-scripts || true

# NOTE: Build and deploy jobs removed.
# central-hub-v3 Flask app deploys via ci.yml and deploy.yml
# central-hub-api Node.js app deploys via deploy-central-hub-api.yml (GHCR image)
# No build/deploy of central-hub from this workflow to avoid conflicts.
