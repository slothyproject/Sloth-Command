name: Deploy to Railway

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'central-hub-v3/apps/api/**'    # API handled by deploy-central-hub-api.yml
      - '.github/workflows/deploy-central-hub-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    name: Deploy Flask Hub to Railway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying central-hub-v3 Flask service to Railway..."
          railway up --service central-hub-v3 --detach
          echo "✅ Deployment initiated!"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check Railway dashboard: https://railway.com/project/4e4e0f03-0c70-443a-ab59-757c492a8142"
