name: Deploy to Railway

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:  # Allow manual trigger
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    name: Pre-deployment Checks
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Migration Analysis
        run: |
          echo "🔍 Analyzing migration chain..."
          python nuclear_reset.py --check-only || true
          echo "✅ Analysis complete"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production
    name: Deploy to Railway
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying Dissident Bot to Railway..."
          
          # Link to project
          railway link --project e64047e5-e5fd-453b-99da-4771d6b533ca --environment production
          
          # Deploy
          railway up --detach
          
          echo "✅ Deployment initiated!"

      - name: Verify Deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "⏳ Waiting for deployment to start..."
          sleep 20
          
          echo "📊 Checking deployment status..."
          railway status || echo "⚠️ Could not get status"
          
          echo "📝 Recent logs:"
          railway logs 2>&1 | tail -50 || echo "⚠️ Could not fetch logs"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "Common fixes:"
          echo "1. Check Railway dashboard: https://railway.com/project/e64047e5-e5fd-453b-99da-4771d6b533ca"
          echo "2. Run locally: python nuclear_reset.py --check-only"
          echo "3. Check environment variables in Railway dashboard"
