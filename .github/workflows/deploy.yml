name: Deploy to Railway

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'central-hub-v3/apps/api/**'    # API handled by deploy-central-hub-api.yml
      - '.github/workflows/deploy-central-hub-api.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    name: Deploy Flask Hub to Railway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying Sloth Command Dashboard service to Railway..."
          railway up \
            --project 93e7ba72-7735-4313-a0b4-ffdb8b53830e \
            --environment 3a1503e1-46a4-4d5d-87d3-61a646d2aa3b \
            --service dd293ea7-d490-4f6a-b524-61b222649aa9 \
            --detach
          echo "✅ Deployment initiated!"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check Railway dashboard: https://railway.com/project/93e7ba72-7735-4313-a0b4-ffdb8b53830e"
