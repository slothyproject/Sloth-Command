name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & test ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dissident
          POSTGRES_PASSWORD: dissident
          POSTGRES_DB: dissident_hub_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://dissident:dissident@localhost:5432/dissident_hub_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      DISCORD_CLIENT_ID: "0"
      DISCORD_CLIENT_SECRET: ci-secret
      DISCORD_REDIRECT_URI: http://localhost:8080/auth/callback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-flask

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Build Docker image ──────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dissident-central-hub:${{ github.sha }} .

      - name: Smoke test image
        run: |
          docker run -d --name hub \
            -e SECRET_KEY=smoke-test \
            -e DATABASE_URL=postgresql://x:x@localhost/x \
            -e REDIS_URL=redis://localhost:6379/0 \
            -p 8080:8080 \
            dissident-central-hub:${{ github.sha }} || true

  # ── Deploy to Railway ───────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service dissident-central-hub
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
