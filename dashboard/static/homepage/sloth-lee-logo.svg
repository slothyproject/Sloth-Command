<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slothGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558B2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Outer circle background -->
  <circle cx="128" cy="128" r="120" fill="#f8f9fa" filter="url(#shadow)"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Main sloth head - modern geometric style -->
  <g filter="url(#shadow)">
    <!-- Head base -->
    <circle cx="128" cy="110" r="45" fill="url(#slothGradient)"/>
    
    <!-- Left ear -->
    <ellipse cx="95" cy="75" rx="16" ry="22" fill="url(#slothGradient)"/>
    <ellipse cx="95" cy="75" rx="10" ry="14" fill="#689F38"/>
    
    <!-- Right ear -->
    <ellipse cx="161" cy="75" rx="16" ry="22" fill="url(#slothGradient)"/>
    <ellipse cx="161" cy="75" rx="10" ry="14" fill="#689F38"/>
    
    <!-- Face highlights -->
    <ellipse cx="105" cy="105" rx="14" ry="18" fill="#9CCC65" opacity="0.4"/>
    <ellipse cx="151" cy="105" rx="14" ry="18" fill="#9CCC65" opacity="0.4"/>
    
    <!-- Eyes - intelligent, focused -->
    <circle cx="110" cy="100" r="7" fill="#ffffff"/>
    <circle cx="146" cy="100" r="7" fill="#ffffff"/>
    
    <!-- Pupils - slightly off-center for intelligence -->
    <circle cx="111" cy="101" r="4.5" fill="#1a1a1a"/>
    <circle cx="147" cy="101" r="4.5" fill="#1a1a1a"/>
    
    <!-- Eye highlights - gives life to the logo -->
    <circle cx="112" cy="99" r="1.5" fill="#ffffff"/>
    <circle cx="148" cy="99" r="1.5" fill="#ffffff"/>
    
    <!-- Nose -->
    <ellipse cx="128" cy="120" rx="6" ry="7" fill="#558B2F"/>
    
    <!-- Gentle smile -->
    <path d="M 122 128 Q 128 132 134 128" stroke="#558B2F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Body - simplified, modern -->
  <g filter="url(#shadow)">
    <ellipse cx="128" cy="165" rx="42" ry="48" fill="url(#slothGradient)"/>
    <ellipse cx="128" cy="165" rx="38" ry="44" fill="#9CCC65" opacity="0.3"/>
  </g>

  <!-- Left arm -->
  <g filter="url(#shadow)">
    <ellipse cx="78" cy="155" rx="15" ry="40" fill="url(#slothGradient)" transform="rotate(-25 78 155)"/>
    <circle cx="65" cy="185" r="12" fill="url(#slothGradient)"/>
  </g>

  <!-- Right arm -->
  <g filter="url(#shadow)">
    <ellipse cx="178" cy="155" rx="15" ry="40" fill="url(#slothGradient)" transform="rotate(25 178 155)"/>
    <circle cx="191" cy="185" r="12" fill="url(#slothGradient)"/>
  </g>

  <!-- Left leg -->
  <g filter="url(#shadow)">
    <ellipse cx="105" cy="210" rx="14" ry="32" fill="url(#slothGradient)"/>
    <ellipse cx="102" cy="243" rx="16" ry="12" fill="#558B2F"/>
  </g>

  <!-- Right leg -->
  <g filter="url(#shadow)">
    <ellipse cx="151" cy="210" rx="14" ry="32" fill="url(#slothGradient)"/>
    <ellipse cx="154" cy="243" rx="16" ry="12" fill="#558B2F"/>
  </g>

  <!-- Accent element - modern badge/shield style -->
  <g filter="url(#shadow)" transform="translate(195, 60)">
    <path d="M 0,-5 L 8,-2 L 8,8 Q 0,14 -8,8 L -8,-2 Z" fill="url(#accentGradient)"/>
    <!-- Small check or star inside badge -->
    <path d="M -2,2 L 1,5 L 4,0" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: Sloth Lee (optional, can be removed for icon-only use) -->
  <text x="128" y="245" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#558B2F" letter-spacing="0.5">
    Sloth Lee
  </text>
</svg>