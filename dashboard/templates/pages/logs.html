{% extends "base.html" %}
{% block title %}Audit Log — Sloth Lee Command Hub{% endblock %}
{% block page_slug %}audit log{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-header__title">Audit Log</h1>
  <span class="page-header__sub">// hub actions</span>
</div>
<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr><th>TIME</th><th>ACTION</th><th>USER</th><th>IP</th></tr>
    </thead>
    <tbody id="audit-body">
      <tr><td colspan="4" class="empty-inline">loading...</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}
{% block scripts %}
<script>
(async () => {
  const logs = await fetch('/api/audit?limit=100').then(r => r.json()).catch(() => []);
  const body = document.getElementById('audit-body');
  if (!logs.length) {
    body.innerHTML = '<tr><td colspan="4" class="empty-inline">no audit events yet</td></tr>';
    return;
  }
  body.innerHTML = logs.map(l => `
    <tr>
      <td class="td-mono">${new Date(l.created_at).toLocaleString()}</td>
      <td><span class="badge badge--default">${l.action}</span></td>
      <td>${l.actor || '—'}</td>
      <td class="td-mono">${l.ip_address || '—'}</td>
    </tr>`).join('');
})();
</script>
{% endblock %}
