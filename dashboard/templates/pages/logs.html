{% extends "base.html" %}
{% block title %}Logs — Dissident Central Hub{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-header__title">Audit Log</h1>
  <span class="page-header__subtitle">All actions taken in the Hub</span>
</div>
<div class="table-wrap">
  <table class="data-table" id="audit-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Action</th>
        <th>User</th>
        <th>IP</th>
      </tr>
    </thead>
    <tbody id="audit-body">
      <tr><td colspan="4" class="empty-state">Loading…</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}
{% block scripts %}
<script>
(async () => {
  const resp = await fetch('/api/audit?limit=100');
  const logs = await resp.json();
  const body = document.getElementById('audit-body');
  if (!logs.length) { body.innerHTML = '<tr><td colspan="4" class="empty-state">No audit logs yet.</td></tr>'; return; }
  body.innerHTML = logs.map(l => `
    <tr>
      <td class="td-mono">${new Date(l.created_at).toLocaleString()}</td>
      <td><span class="badge">${l.action}</span></td>
      <td>${l.actor || '—'}</td>
      <td class="td-mono">${l.ip_address || '—'}</td>
    </tr>
  `).join('');
})();
</script>
{% endblock %}
