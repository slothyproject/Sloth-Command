<header class="navbar">
  <button class="navbar__toggle" aria-label="Toggle sidebar" onclick="document.querySelector('.layout').classList.toggle('sidebar-open')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="navbar__title">{% block page_title %}{% endblock %}</div>
  <div class="navbar__right">
    <div class="bot-status" id="bot-status">
      <span class="bot-status__dot bot-status__dot--unknown"></span>
      <span class="bot-status__label">Bot</span>
    </div>
  </div>
</header>
