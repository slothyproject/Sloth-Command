{% extends "base.html" %}
{% block title %}Database | Dissident Bot{% endblock %}
{% block content %}
<div x-data="databaseApp()" x-init="init()">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-foreground">Database Browser</h1>
        <p class="text-sm text-muted-foreground mt-1">Inspect database tables and row counts</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="rounded-xl bg-card border border-card-border p-5 flex flex-col gap-3 hover:border-primary/30 transition-colors">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-primary/10 text-primary">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4"/></svg>
            </div>
            <div class="text-2xl font-bold text-foreground" x-text="tables.length">0</div>
            <div class="text-sm text-muted-foreground">Tables</div>
        </div>
        <div class="rounded-xl bg-card border border-card-border p-5 flex flex-col gap-3 hover:border-primary/30 transition-colors">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-emerald-500/10 text-emerald-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </div>
            <div class="text-2xl font-bold text-foreground" x-text="totalRows">0</div>
            <div class="text-sm text-muted-foreground">Total Rows</div>
        </div>
        <div class="rounded-xl bg-card border border-card-border p-5 flex flex-col gap-3 hover:border-primary/30 transition-colors">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-purple-500/10 text-purple-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </div>
            <div class="text-2xl font-bold text-foreground" x-text="dbSize">0 KB</div>
            <div class="text-sm text-muted-foreground">Database Size</div>
        </div>
    </div>

    <div class="rounded-xl bg-card border border-card-border overflow-hidden">
        <div class="px-5 py-4 border-b border-card-divider">
            <h3 class="text-sm font-semibold text-foreground flex items-center gap-2">
                <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4"/></svg>
                Tables
            </h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead><tr class="border-b border-card-divider text-left text-muted-foreground">
                    <th class="px-5 py-3 font-medium">Table Name</th>
                    <th class="px-5 py-3 font-medium text-right">Rows</th>
                    <th class="px-5 py-3 font-medium text-right">Size</th>
                </tr></thead>
                <tbody>
                    <template x-for="t in tables" :key="t.name">
                        <tr class="border-b border-card-divider last:border-0 hover:bg-surface transition-colors">
                            <td class="px-5 py-3 font-mono font-semibold text-foreground" x-text="t.name"></td>
                            <td class="px-5 py-3 text-right text-foreground" x-text="t.rows != null ? t.rows.toLocaleString() : '-'"></td>
                            <td class="px-5 py-3 text-right text-muted-foreground" x-text="t.size || '-'"></td>
                        </tr>
                    </template>
                    <tr x-show="tables.length===0">
                        <td colspan="3" class="px-5 py-8 text-center text-muted-foreground">No tables found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function databaseApp(){
    return{
        tables:[],totalRows:0,dbSize:'0 KB',
        init(){this.load()},
        async load(){try{var r=await fetch('/api/database/stats');if(r.ok){var d=await r.json();this.tables=d.tables||d||[];this.totalRows=this.tables.reduce(function(s,t){return s+(t.rows||0)},0).toLocaleString();this.dbSize=d.size||this.tables.reduce(function(s,t){return s+parseFloat(t.size)||0},0).toFixed(1)+' KB';}}catch(e){this.tables=[];}}
    };
}
</script>
{% endblock %}
