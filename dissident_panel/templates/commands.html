{% extends "base.html" %}
{% block title %}Commands | Dissident Bot{% endblock %}
{% block content %}
<div x-data="commandsApp()" x-init="init()">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-foreground">Custom Commands</h1>
        <p class="text-sm text-muted-foreground mt-1">Bot commands and their usage statistics</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
        <template x-for="cmd in commands" :key="cmd.name || cmd.command_name">
            <div class="rounded-xl bg-card border border-card-border p-5 hover:border-primary/30 transition-colors flex flex-col gap-3">
                <div class="flex items-start justify-between gap-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-primary/10 text-primary flex-shrink-0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        </div>
                        <div>
                            <div class="text-sm font-bold text-foreground font-mono" x-text="'/' + (cmd.name || cmd.command_name)"></div>
                            <div class="text-xs text-muted-foreground mt-0.5" x-text="cmd.trigger || cmd.name || cmd.command_name"></div>
                        </div>
                    </div>
                    <span class="px-2.5 py-1 rounded-md text-xs font-semibold bg-primary/10 text-primary flex-shrink-0" x-text="(cmd.uses || 0) + ' uses'"></span>
                </div>
                <p class="text-sm text-muted-foreground" x-text="cmd.description || 'No description'"></p>
            </div>
        </template>
    </div>

    <div x-show="commands.length===0" class="rounded-xl bg-card border border-card-border p-8 text-center text-muted-foreground">
        No commands found
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function commandsApp(){
    return{
        commands:[],
        init(){this.load()},
        async load(){try{var r=await fetch('/api/commands');if(r.ok){var d=await r.json();this.commands=d.commands||d||[];}}catch(e){this.commands=[];}}
    };
}
</script>
{% endblock %}
