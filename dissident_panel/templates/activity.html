{% extends "base.html" %}

{% block title %}Activity | Dissident Bot{% endblock %}

{% block content %}
<div x-data="activityApp()" x-init="init()">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-foreground">Activity</h1>
            <p class="text-sm text-muted-foreground mt-1">Recent bot events and actions</p>
        </div>
        <button @click="load()" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-surface text-muted-foreground hover:text-foreground transition-colors flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
            Refresh
        </button>
    </div>

    <div class="flex gap-2 mb-6">
        <template x-for="t in tabs" :key="t.key">
            <button @click="filter=t.key" class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors"
                    :class="filter===t.key?'gradient-bg text-white':'bg-surface text-muted-foreground hover:text-foreground'"
                    x-text="t.label"></button>
        </template>
    </div>

    <div class="rounded-xl bg-card border border-card-border overflow-hidden">
        <div class="p-4 space-y-0">
            <template x-for="(ev, i) in filtered" :key="i">
                <div class="flex gap-3 py-3 relative">
                    <div class="flex-shrink-0 mt-0.5">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center" :class="iconClass(ev.type)">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path x-bind:d="iconPath(ev.type)"/></svg>
                        </div>
                        <div x-show="i<filtered.length-1" class="absolute left-4 top-11 bottom-0 w-px bg-border"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-foreground" x-text="ev.description || ev.message || 'Event'"></p>
                        <div class="flex gap-3 mt-0.5 text-xs text-muted-foreground">
                            <span x-text="Dissident.formatRelativeTime(ev.timestamp)"></span>
                            <span x-show="ev.type" class="px-1.5 py-0.5 rounded text-xs font-medium" :class="badgeClass(ev.type)" x-text="ev.type"></span>
                        </div>
                    </div>
                </div>
            </template>
            <div x-show="filtered.length===0" class="py-12 text-center">
                <svg class="w-10 h-10 mx-auto text-muted-foreground/50 mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <p class="text-sm text-muted-foreground">No activity found</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function activityApp(){
    return {
        events:[],filter:'all',
        tabs:[{key:'all',label:'All'},{key:'command',label:'Commands'},{key:'mod',label:'Moderation'},{key:'system',label:'System'}],
        get filtered(){return this.filter==='all'?this.events:this.events.filter(e=>(e.type||'').toLowerCase()===this.filter);},
        iconPath(t){var m={command:'M8 9l3 3-3 3m5 0h3',mod:'M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z',system:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z'};return m[(t||'').toLowerCase()]||'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z';},
        iconClass(t){var m={command:'bg-primary/10 text-primary',mod:'bg-orange-500/10 text-orange-500',system:'bg-secondary/10 text-secondary'};return m[(t||'').toLowerCase()]||'bg-surface text-muted-foreground';},
        badgeClass(t){var m={command:'bg-primary/10 text-primary',mod:'bg-orange-500/10 text-orange-500',system:'bg-secondary/10 text-secondary'};return m[(t||'').toLowerCase()]||'bg-surface text-muted-foreground';},
        init(){this.load();},
        async load(){try{var r=await Dissident.apiCall('/api/activity');this.events=r.activities||r||[];}catch(e){this.events=[];}}
    };
}
</script>
{% endblock %}
