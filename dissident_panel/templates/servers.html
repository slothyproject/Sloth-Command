{% extends "base.html" %}
{% block title %}Servers | Dissident Bot{% endblock %}

{% block content %}
<div x-data="serversApp()" x-init="init()">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-foreground">Servers</h1>
            <p class="text-sm text-muted-foreground mt-1">Manage your Discord servers</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative">
                <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" x-model="search" @input="filterServers()" placeholder="Search servers..." class="w-56 h-10 pl-10 pr-4 rounded-lg bg-surface border border-card-border text-foreground text-sm focus:border-primary focus:outline-none">
            </div>
            <button @click="loadServers()" class="inline-flex items-center gap-2 px-4 h-10 rounded-lg bg-card border border-card-border text-foreground text-sm hover:border-primary/30 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                Refresh
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="server in filteredServers" :key="server.id">
            <a :href="'/servers/'+server.id+'/dashboard'" class="block rounded-xl bg-card border border-card-border p-5 hover:border-primary/30 hover:-translate-y-0.5 transition-all group">
                <div class="flex items-start gap-4">
                    <div class="w-14 h-14 rounded-xl bg-surface flex items-center justify-center overflow-hidden flex-shrink-0">
                        <img x-show="server.icon_url" :src="server.icon_url" :alt="server.name" class="w-full h-full object-cover">
                        <svg x-show="!server.icon_url" class="w-7 h-7 text-muted-foreground" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4"/></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2">
                            <h3 class="text-sm font-semibold text-foreground truncate" x-text="server.name"></h3>
                            <span x-show="server.verified" class="flex-shrink-0" title="Verified"><svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.322a.75.75 0 00-1.06-1.06L9 11.94l-1.64-1.64a.75.75 0 00-1.06 1.06l2.17 2.17a.75.75 0 001.06 0l4.176-4.176z" clip-rule="evenodd"/></svg></span>
                        </div>
                        <div class="flex items-center gap-3 mt-2 text-xs text-muted-foreground">
                            <span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <span x-text="server.stats?.member_count||0"></span></span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-between mt-4 pt-3 border-t border-card-divider">
                    <span class="px-2.5 py-1 rounded-lg text-xs font-semibold" :class="server.is_premium ? 'bg-purple-500/10 text-purple-500' : 'bg-emerald-500/10 text-emerald-500'" x-text="server.is_premium ? 'Premium' : 'Active'"></span>
                    <svg class="w-4 h-4 text-muted-foreground group-hover:text-primary transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                </div>
            </a>
        </template>
    </div>

    <div x-show="filteredServers.length===0" class="text-center py-16">
        <svg class="w-16 h-16 mx-auto text-muted-foreground/30 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4"/></svg>
        <h3 class="text-lg font-semibold text-foreground">No servers found</h3>
        <p class="text-sm text-muted-foreground mt-1">Connect your Discord server to get started</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function serversApp() {
    return {
        servers: [], filteredServers: [], search: '',
        async init() { await this.loadServers(); },
        async loadServers() {
            try { const r=await fetch('/api/servers'); const d=await r.json(); this.servers=d.servers||[]; } catch(e) { this.servers=[]; }
            this.filterServers();
        },
        filterServers() {
            if(!this.search) { this.filteredServers=[...this.servers]; return; }
            const q=this.search.toLowerCase();
            this.filteredServers=this.servers.filter(s=>s.name.toLowerCase().includes(q)||(s.owner_name&&s.owner_name.toLowerCase().includes(q)));
        }
    };
}
</script>
{% endblock %}
