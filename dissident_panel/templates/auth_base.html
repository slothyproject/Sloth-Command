<!DOCTYPE html>
<html lang="en" data-theme="theme-dissident">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="{% block description %}Dissident Bot — Authentication{% endblock %}">
    <title>{% block title %}Dissident Bot{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23a855f7' width='100' height='100' rx='20'/><text y='70' x='50' text-anchor='middle' font-size='60' fill='white'>D</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/output.css">

    {% block head %}{% endblock %}

    <script>
        (function() {
            var stored = localStorage.getItem('dissident-theme');
            if (stored) document.documentElement.setAttribute('data-theme', stored);
        })();
    </script>
</head>
<body class="min-h-screen bg-background text-foreground font-sans antialiased flex items-center justify-center p-4 relative overflow-hidden">

    <div class="blob-1" style="top:10%;left:10%"></div>
    <div class="blob-2" style="top:50%;right:5%"></div>
    <div class="blob-3" style="bottom:10%;left:30%"></div>

    {# Theme toggle #}
    <div x-data="{ theme: localStorage.getItem('dissident-theme') || 'theme-dissident' }" class="fixed top-4 right-4 z-50">
        <button class="w-10 h-10 rounded-xl ds-glass flex items-center justify-center text-muted-foreground hover:text-foreground hover:border-primary/50 transition-colors"
            @click="const themes = ['theme-dissident', 'theme-dissident-light', 'theme-amoled']; const idx = themes.indexOf(theme); theme = themes[(idx+1)%themes.length]; document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('dissident-theme', theme);">
            <svg x-show="theme === 'theme-dissident'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg x-show="theme === 'theme-dissident-light'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg x-show="theme === 'theme-amoled'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="3"/></svg>
        </button>
    </div>

    {# Back to homepage #}
    <a href="/homepage" class="fixed top-4 left-4 z-50 flex items-center gap-2 px-4 py-2 rounded-xl ds-glass text-muted-foreground hover:text-foreground hover:border-primary/50 transition-colors text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        Home
    </a>

    <div class="w-full max-w-md relative z-10">
        {% block content %}{% endblock %}
    </div>

    <script src="/static/js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
