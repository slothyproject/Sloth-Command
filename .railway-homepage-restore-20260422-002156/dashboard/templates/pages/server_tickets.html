{% extends "base.html" %}
{% block title %}Tickets — {{ guild.name }}{% endblock %}
{% block page_slug %}{{ guild.name }} / tickets{% endblock %}
{% block content %}
<a href="{{ url_for('core.server_detail', guild_id=guild.id) }}" class="back">← {{ guild.name }}</a>
<div class="page-header" style="margin-top:10px">
  <h1 class="page-header__title">Tickets</h1>
  <span class="page-header__sub">// {{ guild.name }}</span>
</div>

<div style="display:flex;gap:8px;margin-bottom:16px">
  <button class="btn btn--ghost btn--sm" onclick="filterTickets('open')">Open</button>
  <button class="btn btn--ghost btn--sm" onclick="filterTickets('closed')">Closed</button>
  <button class="btn btn--ghost btn--sm" onclick="filterTickets('')">All</button>
</div>

<div id="ticket-count" style="font-family:var(--font-mono);font-size:10px;color:var(--text-2);margin-bottom:8px"></div>
<div class="ticket-list" id="ticket-list"><div class="empty-inline">loading...</div></div>
{% endblock %}
{% block scripts %}
<script>
const GUILD_ID = {{ guild.id }};
async function filterTickets(status) {
  const params = new URLSearchParams({ per_page: 50 });
  if (status) params.append('status', status);
  const d = await fetch(`/api/guilds/${GUILD_ID}/tickets?${params}`).then(r => r.json()).catch(() => ({tickets:[],total:0}));
  document.getElementById('ticket-count').textContent = d.total + ' ticket(s)';
  const list = document.getElementById('ticket-list');
  if (!d.tickets.length) { list.innerHTML = '<div class="empty-inline">No tickets found</div>'; return; }
  list.innerHTML = d.tickets.map(t => `
    <a href="/tickets/${t.id}" class="ticket-item">
      <span class="ticket-num">#${t.ticket_number}</span>
      <span class="ticket-subject">${t.subject || 'Ticket #'+t.ticket_number}</span>
      <span class="ticket-opener">${t.opener_name || '—'}</span>
      <span class="badge badge--${t.status === 'open' ? 'online' : 'default'}">${t.status}</span>
      <span class="badge pri--${t.priority}">${t.priority}</span>
      <span class="ticket-meta">${new Date(t.created_at).toLocaleDateString()}</span>
    </a>`).join('');
}
filterTickets('open');
</script>
{% endblock %}
