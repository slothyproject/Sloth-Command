# 🔧 RAILWAY CONFIGURATION - CENTRAL-HUB-API
# This file tells Railway exactly how to build and deploy the backend

[build]
# Use Dockerfile for building
builder = "DOCKERFILE"

# IMPORTANT: Path to Dockerfile relative to repo root
# Since your files are in central-hub-v3/apps/api/, use this path:
rootDirectory = "central-hub-v3/apps/api"

# Dockerfile location (relative to rootDirectory)
dockerfilePath = "Dockerfile"

[deploy]
# How to start the service
startCommand = "node dist/index.js"

# Health check endpoint
healthcheckPath = "/api/health"

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# NOTE: Make sure these environment variables are set in Railway Dashboard:
# - DATABASE_URL (from your postgres database)
# - JWT_SECRET (use the one provided)
# - DEFAULT_PASSWORD (your login password)
# - PORT (3001)
